services:
  # API Gateway — only entry point exposed to the host
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - collection-service
      - history-service
      - environment-service
    networks:
      - app-network

  # Auth Service — internal only, no host port needed
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
    networks:
      - app-network

  # Collection Service — internal only, no host port needed
  collection-service:
    build:
      context: ./services/collection-service
      dockerfile: Dockerfile
    container_name: collection-service
    environment:
      - PORT=3002
      - MONGODB_URI=${MONGODB_URI}
      - AUTH_SERVICE_URL=http://auth-service:3001
    networks:
      - app-network

  # History Service — internal only, no host port needed
  history-service:
    build:
      context: ./services/history-service
      dockerfile: Dockerfile
    container_name: history-service
    environment:
      - PORT=3003
      - MONGODB_URI=${MONGODB_URI}
      - AUTH_SERVICE_URL=http://auth-service:3001
    networks:
      - app-network

  # Environment Service — internal only, no host port needed
  environment-service:
    build:
      context: ./services/environment-service
      dockerfile: Dockerfile
    container_name: environment-service
    environment:
      - PORT=3004
      - MONGODB_URI=${MONGODB_URI}
      - AUTH_SERVICE_URL=http://auth-service:3001
    networks:
      - app-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: api-playground-frontend
    ports:
      - "8080:80"
    depends_on:
      - api-gateway
    networks:
      - app-network

networks:
  app-network:
    driver: bridge