events {
  worker_connections 1024;
}

http {
  upstream auth_service {
    server auth-service:3001;
  }

  upstream collection_service {
    server collection-service:3002;
  }

  upstream history_service {
    server history-service:3003;
  }

  upstream environment_service {
    server environment-service:3004;
  }

  server {
    listen 3000;

    location /health {
      add_header Content-Type application/json;
      return 200 '{"status":"ok","service":"api-gateway"}';
    }

    # Auth routes
    location = /api/auth {
      proxy_pass http://auth_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/auth/ {
      proxy_pass http://auth_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Collection docs (before /api/collections/)
    location /api/collections/docs/ {
      proxy_pass http://collection_service/docs/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    # Collections — exact match prevents 301 on missing trailing slash
    location = /api/collections {
      proxy_pass http://collection_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }
    location /api/collections/ {
      proxy_pass http://collection_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    # Request routes
    location /api/requests/ {
      proxy_pass http://collection_service/requests/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    # History — exact match prevents redirect
    location = /api/history {
      proxy_pass http://history_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }
    location /api/history/ {
      proxy_pass http://history_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    # Environments — exact match prevents redirect
    location = /api/environments {
      proxy_pass http://environment_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }
    location /api/environments/ {
      proxy_pass http://environment_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }
  }
}